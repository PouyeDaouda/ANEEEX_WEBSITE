name: Keep Render Service Alive

on:
  schedule:
    # S'exécute toutes les 10 minutes (00, 10, 20, 30, 40, 50 de chaque heure)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Permet de tester manuellement le ping depuis l'onglet Actions

jobs:
  ping_site:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the website
        # On utilise un User-Agent de navigateur et un paramètre de temps pour forcer le réveil
        run: |
          curl -sSfL -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
          "${{ secrets.WEBSITE_URL }}?nocache=$(date +%s)" > /dev/null || echo "Ping failed"
